<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="200" cy="200" r="200" fill="#E0E7FF"/>
  <!-- Subtle gradient overlay -->
  <circle cx="200" cy="200" r="200" fill="url(#grad)"/>
  <defs>
    <radialGradient id="grad" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#C7D2FE" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#A5B4FC" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Body / shoulders -->
  <ellipse cx="200" cy="340" rx="110" ry="80" fill="#6366F1"/>
  <!-- Neck -->
  <rect x="182" y="252" width="36" height="44" rx="10" fill="#FBBF9A"/>
  <!-- Head -->
  <ellipse cx="200" cy="224" rx="72" ry="80" fill="#FBBF9A"/>
  <!-- Hair -->
  <ellipse cx="200" cy="164" rx="72" ry="42" fill="#1E293B"/>
  <rect x="128" y="164" width="22" height="50" rx="11" fill="#1E293B"/>
  <rect x="250" y="164" width="22" height="50" rx="11" fill="#1E293B"/>
  <!-- Ears -->
  <ellipse cx="128" cy="226" rx="12" ry="16" fill="#FBBF9A"/>
  <ellipse cx="272" cy="226" rx="12" ry="16" fill="#FBBF9A"/>
  <!-- Eyes -->
  <ellipse cx="175" cy="220" rx="10" ry="11" fill="#1E293B"/>
  <ellipse cx="225" cy="220" rx="10" ry="11" fill="#1E293B"/>
  <circle cx="178" cy="217" r="3" fill="white"/>
  <circle cx="228" cy="217" r="3" fill="white"/>
  <!-- Eyebrows -->
  <rect x="163" y="204" width="24" height="5" rx="2.5" fill="#1E293B"/>
  <rect x="213" y="204" width="24" height="5" rx="2.5" fill="#1E293B"/>
  <!-- Nose -->
  <ellipse cx="200" cy="238" rx="6" ry="8" fill="#F0A080" opacity="0.5"/>
  <!-- Smile -->
  <path d="M182 256 Q200 272 218 256" stroke="#C47A5A" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
